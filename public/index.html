
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>EduTok</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme Color (شريط المتصفح) -->
    <meta name="theme-color" content="#09090b" />
    <meta name="background-color" content="#09090b" />

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EduTok" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/8841/8841503.png" />

    <!-- Android / General -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="EduTok" />
    <meta name="description" content="منصة تعليمية تفاعلية للطلاب - التعلم بطريقة ممتعة" />

    <!-- منع التحديد والسياقات غير المرغوبة على الموبايل -->
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { margin: 0; background-color: #09090b; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
